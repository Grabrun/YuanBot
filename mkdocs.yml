# YuanBot 文档站点配置
# MkDocs + Material 主题

site_name: "YuanBot"
site_description: "有记忆、有情感、会主动想起你的 AI 虚拟伴侣"
site_url: "https://grabrun.github.io/YuanBot"
repo_url: "https://github.com/Grabrun/YuanBot"
repo_name: "Grabrun/YuanBot"
edit_uri: "edit/master/docs/"

# 主题配置
theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: pink
      accent: pink
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - scheme: slate
      primary: pink
      accent: pink
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  custom_dir: docs/overrides

# 插件
plugins:
  - search:
      lang: zh
  - git-revision-date-localized:
      type: datetime
      locale: zh

# Markdown 扩展
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - def_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# 导航结构
nav:
  - 首页: index.md
  - 快速开始:
    - 快速部署: getting-started.md
    - 配置说明: configuration.md
    - 部署指南: deployment.md
  - 架构设计:
    - 总体架构: architecture-v1.5.md
    - 接入与通信: gateway-communication-system.md
    - AI 提供商: ai-provider-system-v2.md
    - 人格与决策: persona-decision-system.md
    - 记忆与情感: memory-emotion-system.md
    - 能力与工具: capability-tool-system.md
    - 主动陪伴: proactive-companion-system.md
    - 语音合成: tts-system.md
    - 用户界面: user-interface-system.md
  - 开发指南:
    - 开发标准: development-standards-ecosystem.md
    - API 参考: api-reference.md
    - 适配器规范:
      - AI 适配器: adapter-ai-spec.md
      - 通道适配器: adapter-channel-spec.md
  - 运维:
    - 运维指南: operations-guide.md
    - 基础设施: infrastructure-deployment-system.md
  - 项目:
    - 设计审查: design-review-report-v4.md
    - 符合度报告: conformance-report.md

# 自定义 CSS
extra_css:
  - stylesheets/extra.css

# 页脚
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Grabrun/YuanBot
  generator: false

copyright: "Copyright &copy; 2026 YuanBot Team"
