# YuanBot Nginx 反向代理配置
# 设计参考: infrastructure-deployment-system.md
#
# 功能:
#   - TLS 终止 (HTTPS)
#   - WebSocket 路由 (/ws/chat, /ws/logs)
#   - 静态文件缓存 (WebUI)
#   - 反向代理到 YuanBot 后端
#   - 安全头 (HSTS, XSS Protection, etc.)
#   - 速率限制
#
# 使用方法:
#   1. 修改 server_name 为你的域名
#   2. 将 SSL 证书放到 /etc/nginx/ssl/ 目录
#   3. cp nginx/nginx.conf /etc/nginx/conf.d/yuanbot.conf
#   4. nginx -t && systemctl reload nginx

# --- 上游服务器定义 ---
upstream yuanbot_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# --- 速率限制区域 ---
limit_req_zone $binary_remote_addr zone=yuanbot_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=yuanbot_login:10m rate=5r/m;

# --- HTTP → HTTPS 重定向 ---
server {
    listen 80;
    listen [::]:80;
    server_name yuanbot.example.com;

    # Let's Encrypt ACME 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS 主配置 ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yuanbot.example.com;

    # --- TLS 配置 ---
    ssl_certificate     /etc/nginx/ssl/yuanbot.crt;
    ssl_certificate_key /etc/nginx/ssl/yuanbot.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- 安全头 ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- 请求体大小 ---
    client_max_body_size 50m;

    # --- 日志 ---
    access_log /var/log/nginx/yuanbot_access.log;
    error_log  /var/log/nginx/yuanbot_error.log;

    # --- WebSocket 端点 (聊天) ---
    location /ws/chat {
        limit_req zone=yuanbot_api burst=10 nodelay;

        proxy_pass http://yuanbot_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 超时 (2 小时)
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
    }

    # --- WebSocket 端点 (日志) ---
    location /ws/logs {
        # 仅管理员可访问 (通过应用层鉴权)
        proxy_pass http://yuanbot_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
    }

    # --- 登录接口 (严格限流) ---
    location /api/auth/login {
        limit_req zone=yuanbot_login burst=3 nodelay;
        proxy_pass http://yuanbot_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- API 接口 ---
    location /api/ {
        limit_req zone=yuanbot_api burst=20 nodelay;

        proxy_pass http://yuanbot_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 禁止代理缓冲 (SSE/流式响应)
        proxy_buffering off;
    }

    # --- 健康检查 (无速率限制) ---
    location /health {
        proxy_pass http://yuanbot_backend;
        proxy_set_header Host $host;
    }

    location /healthz {
        proxy_pass http://yuanbot_backend;
        proxy_set_header Host $host;
    }

    location /readyz {
        proxy_pass http://yuanbot_backend;
        proxy_set_header Host $host;
    }

    # --- Prometheus 指标 (仅内网访问) ---
    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://yuanbot_backend;
        proxy_set_header Host $host;
    }

    # --- TTS API ---
    location /api/tts/ {
        limit_req zone=yuanbot_api burst=10 nodelay;

        proxy_pass http://yuanbot_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- WebUI 静态资源 ---
    location / {
        proxy_pass http://yuanbot_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            proxy_pass http://yuanbot_backend;
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # --- 拒绝敏感路径 ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ^/(configs|data|logs|\.env) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
