# OpenAI Provider 配置 (v2.0)
# 使用 openai-adapter，所有 OpenAI 兼容 API 的提供商均可复用此适配器

provider_id: openai
name: "OpenAI"
adapter: openai-adapter
enabled: true

config:
  api_key: "${OPENAI_API_KEY}"
  base_url: "https://api.openai.com/v1"
  models:
    - id: gpt-4o
      type: chat
      max_tokens: 128000
    - id: gpt-4o-mini
      type: chat
      max_tokens: 128000
    - id: text-embedding-3-small
      type: embedding
      max_tokens: 8191
      dimension: 1536
  default: gpt-4o
  embedding_model: text-embedding-3-small
