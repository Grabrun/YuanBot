# OpenAI Provider 配置

provider_id: "openai"
display_name: "OpenAI"
enabled: true
default: true

# API 配置
api:
  base_url: "https://api.openai.com/v1"
  api_key: "${YUAN_AI_OPENAI_API_KEY}"
  timeout: 60
  max_retries: 3

# 模型列表
models:
  - id: "gpt-4o"
    type: "chat"
    default: true
    max_tokens: 128000
    supports_tools: true
    supports_streaming: true
  - id: "gpt-4o-mini"
    type: "chat"
    default: false
    max_tokens: 128000
    supports_tools: true
    supports_streaming: true
  - id: "text-embedding-3-small"
    type: "embedding"
    default: true
    dimensions: 1536
