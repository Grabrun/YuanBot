# OpenAI Provider 配置 (v3.0)
# 使用 openai-adapter，所有 OpenAI 兼容 API 的提供商均可复用此适配器
# ⚠️ GPT-4o / GPT-4.1 系列已于 2026-02-13 从 API 退役

provider_id: openai
name: "OpenAI"
adapter: openai-adapter
enabled: true

config:
  api_key: "${OPENAI_API_KEY}"
  base_url: "https://api.openai.com/v1"
  models:
    - id: gpt-5.5
      type: chat
      max_tokens: 256000
    - id: gpt-5.4
      type: chat
      max_tokens: 256000
    - id: gpt-5.4-mini
      type: chat
      max_tokens: 256000
    - id: o4-mini
      type: chat
      max_tokens: 200000
    - id: text-embedding-3-small
      type: embedding
      max_tokens: 8191
      dimension: 1536
  default: gpt-5.4
  embedding_model: text-embedding-3-small
