# Claude (Anthropic) Provider 配置

provider_id: "claude"
display_name: "Anthropic Claude"
enabled: true
default: false

# API 配置
api:
  base_url: "https://api.anthropic.com"
  api_key: "${YUAN_AI_ANTHROPIC_API_KEY}"
  timeout: 60
  max_retries: 3

# 模型列表
models:
  - id: "claude-sonnet-4-20250514"
    type: "chat"
    default: true
    max_tokens: 200000
    supports_tools: true
    supports_streaming: true
  - id: "claude-haiku-4-20250514"
    type: "chat"
    default: false
    max_tokens: 200000
    supports_tools: true
    supports_streaming: true
