# 腾讯混元 Provider 配置 (v3.0)
# 使用 openai-adapter（混元 API 兼容 OpenAI 格式）
# ⚠️ hunyuan-pro / hunyuan-standard 将于 2026-06-22 下线
# 最新：混元 2.0 系列

provider_id: hunyuan
name: "腾讯混元"
adapter: openai-adapter
enabled: false

config:
  api_key: "${HUNYUAN_API_KEY}"
  base_url: "https://api.hunyuan.cloud.tencent.com/v1"
  models:
    - id: hunyuan-turbos-latest
      type: chat
      max_tokens: 131072
    - id: hunyuan-2.0-thinking-20251109
      type: chat
      max_tokens: 131072
    - id: hunyuan-2.0-instruct-20251111
      type: chat
      max_tokens: 131072
  default: hunyuan-turbos-latest
