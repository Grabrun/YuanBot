# 智谱 GLM Provider 配置 (v3.0)
# 使用 openai-adapter（GLM API 兼容 OpenAI 格式）
# 最新旗舰：GLM-5 (744B, 2026-02)，开源 SOTA

provider_id: glm
name: "智谱 GLM"
adapter: openai-adapter
enabled: false

config:
  api_key: "${GLM_API_KEY}"
  base_url: "https://open.bigmodel.cn/api/paas/v4"
  models:
    - id: glm-5
      type: chat
      max_tokens: 200000
    - id: glm-5-flash
      type: chat
      max_tokens: 128000
    - id: glm-4
      type: chat
      max_tokens: 128000
    - id: embedding-3
      type: embedding
      max_tokens: 8192
      dimension: 2048
  default: glm-5
  embedding_model: embedding-3
