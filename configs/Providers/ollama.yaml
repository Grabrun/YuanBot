# Ollama 本地模型 Provider 配置 (v2.0)
# 使用 openai-adapter（Ollama 支持 OpenAI 兼容 API）

provider_id: ollama
name: "Ollama (本地)"
adapter: openai-adapter
enabled: false

config:
  base_url: "http://localhost:11434/v1"
  api_key: "ollama"
  models:
    - id: qwen3:14b
      type: chat
      max_tokens: 32768
    - id: nomic-embed-text
      type: embedding
      max_tokens: 8192
      dimension: 768
  default: qwen3:14b
