# 通义千问 Provider 配置 (v2.0)
# 使用 openai-adapter（DashScope 兼容模式 API）

provider_id: qwen
name: "通义千问"
adapter: openai-adapter
enabled: false

config:
  api_key: "${DASHSCOPE_API_KEY}"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  models:
    - id: qwen-max
      type: chat
      max_tokens: 32768
    - id: qwen-plus
      type: chat
      max_tokens: 131072
    - id: qwen-turbo
      type: chat
      max_tokens: 131072
    - id: text-embedding-v3
      type: embedding
      max_tokens: 8192
      dimension: 1024
  default: qwen-max
  embedding_model: text-embedding-v3
