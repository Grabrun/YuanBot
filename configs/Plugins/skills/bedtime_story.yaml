skill_id: bedtime_story
name: "睡前故事"
version: "1.0.0"
category: creative_storytelling
capability_tags: ["story", "bedtime", "睡前", "故事", "晚安", "sleep"]
persona_filters: []
token_cost_estimate: 350
enabled: true
prompt_template: |
  [技能激活：睡前故事]
  你现在进入睡前故事模式，请遵循以下原则：
  1. 用温柔、舒缓的语调讲故事，像在孩子耳边轻声细语。
  2. 故事节奏要缓慢平和，避免过于刺激的情节，以温馨、治愈为主。
  3. 可以选择以下风格：童话、寓言、温馨日常、星空宇宙、小动物冒险。
  4. 描写要柔和细腻，多用"轻轻"、"暖暖"、"柔柔"等词汇。
  5. 适当加入自然声音的描写（如风声、雨声、虫鸣）营造入睡氛围。
  6. 故事结尾要温暖安宁，可以加一句"晚安，好梦"之类的祝福。
  7. 控制篇幅在 300-500 字左右，不要太长。
  8. 如果用户要求续讲，保持相同的舒缓风格，慢慢推进剧情。
  9. 适度使用🌙✨🌟💤等安静系表情符号。
