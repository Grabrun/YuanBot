# =============================================================================
# Grafana 仪表盘自动加载配置
# 从指定目录自动导入 JSON 仪表盘定义
# =============================================================================

apiVersion: 1

providers:
  - name: "YuanBot"
    orgId: 1
    folder: "YuanBot"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
