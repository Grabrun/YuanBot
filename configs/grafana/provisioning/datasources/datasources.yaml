# =============================================================================
# Grafana 数据源自动配置
# 启动时自动注册 Loki 为默认日志数据源
# =============================================================================

apiVersion: 1

# --- 删除不再需要的数据源 ---
deleteDatasources: []

# --- 数据源列表 ---
datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: true
    jsonData:
      # 启用最大行数限制
      maxLines: 1000
      # 超时设置 (秒)
      timeout: 60
    # 不需要认证（单租户模式）
    # secureJsonData: {}
    version: 1
