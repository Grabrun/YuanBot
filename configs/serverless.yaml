# YuanBot Serverless 部署配置模板
#
# 使用方式:
#   AWS Lambda:   handler: yuanbot.deployment.serverless.aws_handler
#   阿里云函数计算: handler: yuanbot.deployment.serverless.aliyun_handler
#
# 环境变量:
#   YUANBOT_CONFIG_PATH: 配置文件路径（默认 configs/serverless.yaml）

app_name: "YuanBot"
version: "1.0.0"
debug: false
log_level: "INFO"

# AI 提供商配置
ai_provider:
  provider_id: "openai"
  default_model: "gpt-4o"
  # api_key 通过环境变量 YUAN_AI_OPENAI_API_KEY 设置

# 消息通道（Serverless 模式下通常只启用 API Gateway）
channels:
  - platform: "web"
    enabled: true
    config: {}

# 记忆系统配置
# Serverless 环境建议使用 Redis 作为工作记忆缓存
# 持久化存储使用云数据库服务
memory:
  vector_db: "milvus_lite"
  vector_db_url: "/tmp/yuanbot/milvus"
  db_url: "sqlite:///tmp/yuanbot.db"
  redis_url: "${YUANBOT_REDIS_URL}"
  graph_db: "kuzu"
  graph_db_url: "/tmp/yuanbot/kuzu"
  max_working_memory_turns: 10  # Serverless 模式减少内存占用
  episodic_memory_max_age_days: 30
  forget_curve_half_life_days: 7
  consolidation_threshold: 5

# 主动交互（Serverless 模式下禁用定时任务，仅响应式）
proactive:
  enabled: false
  greeting_enabled: false
  frequency: "low"
  quiet_hours_start: 23
  quiet_hours_end: 8
  max_per_day: 0
  event_triggers_enabled: false

# Agent 人设
persona_id: "default"
