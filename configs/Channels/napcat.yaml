# NapCat QQ 通道配置
# 基于 OneBot v11 协议 + NapCat 扩展
# 部署 NapCat 后填写以下配置

platform: napcat
display_name: "NapCat QQ"
enabled: false

config:
  # ═══ 正向 WebSocket（主要通讯方式）═══
  # NapCat 的 WebSocket Server 地址
  # 对应 NapCat onebot_config 中的 ws_server 配置
  ws_host: "127.0.0.1"
  ws_port: 3001

  # WebSocket 认证 Token（对应 access_token）
  ws_token: ""

  # ═══ HTTP API（备选通讯方式）═══════
  # 仅当 WS 不可用时降级使用
  http_host: "127.0.0.1"
  http_port: 3000
  http_token: ""

  # 机器人 QQ 号
  bot_qq: ""

  # 启用场景
  enabled_scenes:
    - private
    - group
